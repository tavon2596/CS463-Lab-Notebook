<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Exercise 02 - Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body class="bg-light">
    <!-- Main container for the form -->
    <div class="container my-5">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
          <h1 class="text-center m-4 fs-2">Roth IRA Calculator</h1>
          <!-- Roth IRA Calculator Form -->
          <form class="p-4 border rounded shadow-sm bg-white">
            <!-- Current Age Input -->
            <div class="mb-3 form-floating">
              <input
                type="text"
                class="form-control"
                id="currentAge"
                placeholder="Current Age"
              />
              <label for="currentAge">Current Age</label>
            </div>
            <!-- Retirement Age Input -->
            <div class="mb-3 form-floating">
              <input
                type="text"
                class="form-control"
                id="retirementAge"
                placeholder="Retirement Age"
              />
              <label for="retirementAge">Retirement Age</label>
            </div>
            <!-- Current Roth IRA Balance Input -->
            <div class="mb-3 form-floating">
              <input
                type="text"
                class="form-control"
                id="currentBalance"
                placeholder="Current Roth IRA Balance"
              />
              <label for="currentBalance">Current Roth IRA Balance</label>
            </div>
            <!-- Annual Contribution Input -->
            <div class="mb-3 form-floating">
              <input
                type="text"
                class="form-control"
                id="annualContribution"
                placeholder="Annual Contribution"
              />
              <label for="annualContribution">Annual Contribution</label>
            </div>
            <!-- Expected Annual Growth Rate Input -->
            <div class="mb-3 form-floating">
              <input
                type="text"
                class="form-control"
                id="growthRate"
                placeholder="Expected Annual Growth Rate (%)"
              />
              <label for="growthRate">Expected Annual Growth Rate (%)</label>
            </div>
            <!-- Risk Tolerance Select Input -->
            <div class="mb-3">
              <label for="riskTolerance" class="form-label">Risk Tolerance</label>
              <select class="form-select" id="riskTolerance">
                <option selected>Choose...</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </div>
            <!-- Additional Notes Textarea -->
            <div class="mb-3 form-floating">
              <textarea
                class="form-control"
                placeholder="Leave a comment here"
                id="notes"
                style="height: 100px"
              ></textarea>
              <label for="notes">Additional Notes</label>
            </div>
            <!-- Submit Button -->
            <div class="d-grid">
              <button type="submit" class="btn btn-primary">Calculate</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
