<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>CSS Exercise 02 - Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="01-books.html">Exercise 01 - Books</a>
      <a href="02-form.html">Exercise 02 - Form</a>
    </nav>
    <main class="form-container">
      <h1>Roth IRA Calculator</h1>
      <form>
        <div class="form-group">
          <label for="current-age">Current Age</label>
          <input type="number" id="current-age" name="current-age" min="0" max="120" value="30" />
        </div>
        <div class="form-group">
          <label for="retirement-age">Retirement Age</label>
          <input type="number" id="retirement-age" name="retirement-age" min="0" max="120" value="65" />
        </div>
        <div class="form-group">
          <label for="current-balance">Current Roth IRA Balance</label>
          <input type="number" id="current-balance" name="current-balance" min="0" value="10000" />
        </div>
        <div class="form-group">
          <label for="annual-contribution">Annual Contribution</label>
          <input type="number" id="annual-contribution" name="annual-contribution" min="0" value="6000" />
        </div>
        <div class="form-group">
          <label for="annual-return">Expected Annual Return (%)</label>
          <input type="number" id="annual-return" name="annual-return" min="0" max="100" value="7" />
        </div>
        <button type="submit">Calculate</button>
      </form>
    </main>
  </body>
</html>
