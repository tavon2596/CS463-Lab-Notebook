<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>CSS Exercise 02 - Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="form-page">
    <nav class="navbar">
      <a href="01-books.html">Exercise 01 - Books</a>
      <a href="02-form.html">Exercise 02 - Form</a>
    </nav>
    <div class="form-container">
      <h1>Roth IRA Calculator</h1>
      <form>
        <div class="form-group">
          <label for="balance">Balance ($)</label>
          <input type="number" id="balance" name="balance" />
        </div>
        <div class="form-group">
          <label for="annual-contribution">Annual contribution ($)</label>
          <input type="number" id="annual-contribution" name="annual-contribution" />
        </div>
        <div class="form-group radio-group">
          <label>Maximize contribution?</label>
          <div>
            <input type="radio" id="max-yes" name="maximize" value="yes" />
            <label for="max-yes">Yes</label>
            <input type="radio" id="max-no" name="maximize" value="no" />
            <label for="max-no">No</label>
          </div>
        </div>
        <div class="form-group">
          <label for="expected-return">Expected rate of return (%)</label>
          <input type="number" id="expected-return" name="expected-return" />
        </div>
        <div class="form-group">
          <label for="current-age">Current age</label>
          <input type="number" id="current-age" name="current-age" />
        </div>
        <div class="form-group">
          <label for="retirement-age">Retirement age</label>
          <input type="number" id="retirement-age" name="retirement-age" />
        </div>
        <div class="form-group">
          <label for="tax-rate">Marginal tax rate (%)</label>
          <input type="number" id="tax-rate" name="tax-rate" />
        </div>
        <div class="button-group">
          <button type="submit">Calculate</button>
          <button type="reset" class="reset-btn">Reset</button>
        </div>
      </form>
      <p class="disclaimer">
        This exercise is a simplified version of the Roth IRA Calculator at
        <a href="https://www.calculator.net/roth-ira-calculator.html">Calculator.net</a>
      </p>
    </div>
  </body>
</html>
