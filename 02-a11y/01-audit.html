<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 01 - Audit</title>
  </head>
  <body>
    <form>
      <label for="name">Name:</label><br />
      <input type="text" id="name" name="name" autocomplete="name" required /><br /><br />
      <label for="address">Address:</label><br />
      <input type="text" id="address" name="address" autocomplete="address-line1" required />
      <br /><br />
      <label for="city">City:</label><br />
      <input type="text" id="city" name="city" autocomplete="address-level2" required />
      <br /><br />
      <label for="zip">Zip Code:</label><br />
      <input type="text" id="zip" name="zip" autocomplete="postal-code" required pattern="\d{5}" />
      <br /><br />
      <fieldset>
        <legend>Credit Card Type:</legend>
        <input type="radio" id="visa" name="card" value="visa" required />
        <label for="visa">Visa</label><br />
        <input type="radio" id="mastercard" name="card" value="mastercard" />
        <label for="mastercard">MasterCard</label><br />
        <input type="radio" id="amex" name="card" value="amex" />
        <label for="amex">American Express</label><br />
      </fieldset>
      <br />
      <label for="cc_number">Credit Card Number:</label><br />
      <input type="text" id="cc_number" name="cc_number" autocomplete="cc-number" required pattern="\d{13,19}" /><br /><br />
      <label for="cvv">CVC:</label><br />
      <input type="text" id="cvv" name="cvv" autocomplete="cc-csc" required pattern="\d{3,4}" /><br /><br />
      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
